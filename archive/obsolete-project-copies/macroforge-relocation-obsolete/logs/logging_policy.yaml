logging_policy:
  purpose: optional_raw_operational_record_for_debugging_only

  primary_audit_trail:
    source_of_truth:
      - task_artifacts
      - decision_artifacts
      - handoff_artifacts
      - state_artifacts
      - report_artifacts
    rule: >
      Normal MacroForge governance is recorded in file-backed task, decision,
      handoff, state, and report artifacts. These artifacts are the source of
      truth for audit and continuity.

  operational_logs:
    required_for_normal_governance: false
    source_of_truth: false
    stored_for: debugging_and_optional_operational_audit
    examples:
      - logs/agents/runs.jsonl
      - logs/derived/session_summaries.jsonl
    rule: >
      Operational logs are optional debugging records. Agents do not need to
      populate JSONL logs for ordinary task closeout, and future agents should
      not treat empty operational logs as missing project state.

  non_context_rule: >
    Raw logs, full session JSONL files, full tool outputs, and previous agent
    conversations must never be included in normal task context. Use compact
    state, task, decision, handoff, summary, and report artifacts first. Read raw
    logs only for failure_investigation, forensic, or incident work when those
    artifacts are insufficient.

  levels:
    minimal:
      optional: true
      records:
        - run_summary
        - errors
        - decisions_created
    standard:
      optional: true
      records:
        - run_summary
        - commands_executed
        - files_changed
        - tests_run
        - escalations
        - compact_session_summary
    forensic:
      optional: true
      records:
        - full_tool_outputs
        - model_routing_decisions
        - intermediate_plans
        - failure_traces
      context_warning: forensic logs remain excluded from normal context

  separation_rule: >
    Logs contain optional raw or operational records. Derived performance
    analysis, success-rate calculations, and recommendations belong in metrics/.
    Durable governance continuity belongs in state, task, decision, handoff, and
    report artifacts.
