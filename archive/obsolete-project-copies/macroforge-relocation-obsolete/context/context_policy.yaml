context_policy:
  mode: local_execution_cloud_governance

  macroforge_doctrine:
    purpose: >-
      MacroForge exists to progressively reduce the recurring effort required to
      build, maintain, validate, canonicalize, and use trusted macroeconomic data
      for investment-relevant research. Trusted databases are outputs; the
      effort-reduction system is the project.
    recurring_effort_classes:
      - source_onboarding
      - source_maintenance
      - validation
      - canonical_mapping
      - schema_evolution
      - downstream_analysis
      - future_agent_recovery_context
    rule: >-
      Future work should state which recurring effort it reduces while preserving
      trust. Components that do not improve trust, reproducibility,
      maintainability, semantic correctness, or recurring effort reduction should
      usually be deferred, pruned, or consolidated.

  budgets:
    local_model_tokens: 24000
    cloud_governance_tokens: 10000
    cloud_governance_target_tokens: 8000
    project_wide_review_tokens: 64000
    project_wide_review_target_tokens: 32000

  budget_intent:
    local_model_tokens: routine local execution and implementation context
    cloud_governance_tokens: default compact cloud reasoning bundle for high-leverage decisions
    project_wide_review_tokens: justified cloud governance mode for audits, redesigns, strategic reviews, and gap analysis

  context_modes:
    normal:
      purpose: local execution or narrow task work
      default_model_target: local
      includes: [project_summary, active_task_file, relevant_folder_summaries, relevant_decision_records, explicitly_retrieved_source_files, short_recent_handoff_summary]
    governance:
      purpose: compact cloud architecture/strategy reasoning over selected evidence
      default_model_target: cloud
      requires_context_audit: true
      budget: cloud_governance_tokens
    project_wide_review:
      purpose: larger cloud governance review for architecture audit, redesign, strategic planning, gap analysis, and consistency review
      default_model_target: cloud
      requires_context_audit: true
      requires_review_justification: true
      budget: project_wide_review_tokens
      starts_with_all_folder_summaries: true
      still_excludes_raw_logs_by_default: true

  normal_context_may_include:
    - project_summary
    - active_task_file
    - relevant_folder_summaries
    - relevant_decision_records
    - explicitly_retrieved_source_files
    - short_recent_handoff_summary

  normal_context_must_not_include:
    - raw_logs
    - entire_previous_conversations
    - full_session_jsonl_files
    - whole_project_file_dumps
    - unrelated_folders
    - large_tool_outputs
    - generated_artifacts_unless_explicitly_relevant

  context_loading_hierarchy:
    priority_1_startup_state:
      - state/active_goal.md
      - state/project_state.md
      - state/architecture.md
      - context/latest_handoff.md
    priority_2_task_context:
      - active_task_file
      - relevant_decision_records
      - relevant_folder_summaries
    priority_3_expansion_context:
      - broader_documentation
      - reports
      - design_notes
      - historical_artifacts
    rule: >-
      Normal work starts from concise current-state artifacts and expands only
      as the task requires. Generated context bundles such as
      context/active_context.md are task/model-target outputs, not mandatory
      startup context.

  retrieval_order:
    - read_project_summary
    - identify_relevant_folders
    - read_relevant_folder_summaries
    - read_relevant_decision_records
    - retrieve_only_relevant_files
    - expand_context_incrementally_if_audit_or_reasoning_need_justifies_it
    - read_raw_logs_only_for_failure_investigation_or_summary_gap

  folder_summaries:
    enabled: true
    filename: _SUMMARY.md
    maintained_by: context_manager
    use_before_deep_file_reads: true

  task_completion:
    update_summaries: true
    summary_mode: affected_only
    require_summary_inspection: true
    require_final_verification_after_summary_updates: true
    rule: >-
      When a task is completed, update task outcome/status, state, handoff,
      and affected folder summaries. Prefer affected-only summary refresh;
      inspect refreshed summaries for stale curated Active Work, Needs
      Attention, or task status sections; patch manually if needed; then run
      final verification after governance and summary edits.

  continuity_recovery:
    tool: tools/recover_session.py
    framework_doc: recovery/continuity_framework.md
    startup_command: python3 tools/recover_session.py --project . --json
    bounded_inputs:
      - CONSTITUTION.md
      - state/active_goal.md
      - state/project_state.md
      - state/architecture.md
      - context/latest_handoff.md
      - recent artifacts/tasks/*.md only when needed
      - recent artifacts/decisions/*.md only when needed
      - question_queue/pending/* only when needed
    must_answer:
      - current_project_state
      - active_goal_or_task
      - recent_decisions
      - current_blockers
      - next_recommended_actions
      - recommended_resume_procedure
    standard_closeout_command: Perform standard ProjectForge closeout. Follow the continuity framework. Run required verification if project files changed. Then stop.
    standard_closeout_order:
      - identify_active_task_from_state_handoff_or_recovery_report
      - update_active_task_status_outcome_blockers_incomplete_acceptance_criteria_and_next_action
      - update_context_latest_handoff_with_context_files_changed_verification_blockers_next_actions_and_resume_command
      - update_active_goal_and_project_state_current_pointers_if_changed
      - refresh_affected_summaries_and_inspect_curated_sections
      - run_final_verification_after_task_state_handoff_and_summary_edits
      - replace_pending_verification_placeholders_or_record_remaining_verification_as_blocker
    near_quota_shutdown_order:
      - update_active_task_status_and_incomplete_acceptance_criteria
      - record_blockers_open_questions_or_approval_needs
      - update_context_latest_handoff_with_resume_command
      - update_current_state_pointers_if_changed
      - refresh_affected_summaries_and_run_final_verification_if_budget_remains
    rule: >-
      A fresh session should recover from bounded file-backed state before any
      broad repository exploration. Standard closeout must update task, handoff,
      state pointers, affected summaries, blockers, next actions, and final
      verification without requiring the user to provide an ad hoc checklist.
      Near token, tool, time, or quota exhaustion, continuity updates take
      priority over optional cleanup, broad scans, raw-log reads, or narrative
      polish.

  context_health:
    active_goal_chars: 6000
    project_state_chars: 12000
    architecture_chars: 12000
    recent_changes_chars: 6000
    handoff_warn_chars: 3000
    handoff_block_chars: 9000
    active_context_warn_chars: 40000
    active_context_block_chars: 256000
    generated_context_stale_hours: 168
    rule: >-
      Primary state files are concise current-state pointers. Move historical
      verification transcripts, long file-change inventories, and old session
      narratives to task artifacts, report artifacts, handoffs, or optional
      debug logs.

  architecture_reality_audit:
    cadence: every 5-10 completed tasks
    triggers:
      - before major architecture changes
      - before major governance reviews
      - after repeated signs of docs/state/tooling drift
    tool: tools/architecture_reality_audit.py
    report_location: artifacts/reports/R-YYYYMMDD-architecture-reality-audit.md
    categories:
      - architecture_vs_implementation
      - state_files_vs_reality
      - agent_instructions_vs_behavior
      - logging_systems
      - context_management_systems
      - governance_processes
      - validation_systems
      - source_control_traceability
      - historical_architecture_reconciliation
    rule: >-
      Architecture-to-Reality Audit findings are governance evidence. Fix blocks
      before major architecture/governance work continues and record durable
      architecture or policy changes as decision artifacts.

  audit_trail:
    primary_sources:
      - task_artifacts
      - decision_artifacts
      - handoff_artifacts
      - state_artifacts
      - report_artifacts
    operational_logs: optional_debugging_only
    rule: >-
      Operational logs are optional debugging records and are not required for
      normal governance closeout.

  limits:
    summary_file_chars: 4000
    handoff_chars: 3000
    active_task_chars: 8000
    decision_record_chars: 6000
    explicit_source_file_chars: 20000
    project_wide_source_file_chars: 12000
    project_wide_folder_summary_count: 200

  raw_logs:
    stored_for: audit_debugging_only
    include_in_normal_context: false
    allowed_contexts:
      - failure_investigation
      - forensic
      - incident
    rule: Raw logs are never included in normal context bundles. Governance reviews use summaries and decision history first.

  cloud_audit:
    required_before_cloud_model: true
    report_paths:
      json: context/context_audit.json
      markdown: context/context_audit.md
    required_fields:
      - total_estimated_tokens
      - context_mode
      - review_justification_when_project_wide
      - included_files_with_reasons
      - excluded_files_with_reasons
      - raw_logs_excluded
      - summaries_used
      - model_selected_and_reason

  compression:
    summarize_large_files: true
    large_file_line_threshold: 250
    prefer_summaries_for_non_target_folders: true
    summaries_and_log_compression_use_local_model: true
