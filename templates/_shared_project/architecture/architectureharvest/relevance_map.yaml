schema_version: 1
kind: project_metaharvest_relevance_map
target:
  project_id: {project_slug}
  project_name: {project_name}
status:
  state: active
  created: {date}
  last_reviewed: {date}
  stale: false
consult_required_during:
  - architecture_definition
  - major_architecture_modification
  - introduction_of_new_subsystems
  - creation_of_new_agent_roles
  - memory_context_system_design
  - orchestration_design
  - permission_system_design
  - workflow_redesign
  - scheduled_architecture_reviews
  - repeated_implementation_failures
  - user_requested_improvement_scans
consult_not_required_during:
  - bug_fixes
  - minor_documentation_changes
  - test_additions
  - small_utilities
  - implementation_work_without_architecture_change
recommendation_statuses:
  - active
  - stale
  - superseded
  - retired
active_recommendations: []
stale_recommendations: []
superseded_recommendations: []
retired_recommendations: []
notes:
  - Lightweight placeholder created by ProjectForge.
  - MetaHarvest is advisory only and must not bypass local governance gates.
