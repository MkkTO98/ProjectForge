forbidden_patterns:
  - "rm -rf /"
  - "sudo rm"
  - "mkfs"
  - "dd if="
  - ":(){ :|:& };:"
  - "chmod -R 777 /"
  - "chown -R"
  - "git push --force"
  - "git reset --hard"
  - "truncate -s 0"
  - "> /etc/"
  - "curl * | sh"
  - "wget * | sh"

secret_patterns:
  - "OPENAI_API_KEY"
  - "GITHUB_TOKEN"
  - "TELEGRAM_BOT_TOKEN"
  - "DATABASE_URL"
