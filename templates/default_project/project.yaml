project:
  name: "{project_name}"
  template: "default_project"
  kind: "general"
  scaffold_source: "template"
  logging: "always_on"
  decisions: "mandatory"
  deferred_specification: "enabled"
  identity:
    source: "CONSTITUTION.md"
    ownership: "project-owned"
    generator_authority: "none_after_creation"
