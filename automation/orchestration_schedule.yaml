orchestration_schedule:
  purpose: >
    Defines hygiene and control tasks the brain/orchestrator should run automatically.
    Manual invocation remains available for debugging and audit, but routine operation
    should not depend on the user remembering these commands.

  visibility:
    mode: compact_log_summary
    summary_target: logs/derived/orchestrator_hygiene.log
    notify_user_only_on:
      - block
      - L3_blocking_clarification
      - L4_emergency_stop

  before_agent_assignment:
    - name: select_model
      command: python3 tools/select_model.py --project {project} --agent {agent} --task {task}
      required: true
      reason: Route work to the smallest sufficient model before spending compute or Codex tokens.

  before_execution:
    - name: validate_dry_run
      command: python3 tools/validate_dry_run.py {dry_run_report}
      required_when: dry_run_required
      reason: Prevent vague or incomplete dry-runs from becoming execution permission.

  before_major_architecture_change:
    - name: architecture_reality_audit
      command: python3 tools/architecture_reality_audit.py --project {project} --write-report
      required: true
      reason: Prevent documented architecture, state, governance, templates, and implementation from diverging before changing direction.

  before_major_governance_review:
    - name: architecture_reality_audit
      command: python3 tools/architecture_reality_audit.py --project {project} --write-report
      required: true
      reason: Establish current implementation reality before broad governance review.

  before_architectureharvest_consultation_trigger:
    - name: architectureharvest_relevance_check
      command: inspect ArchitectureHarvest indexes, target relevance map, adoption candidates, rejected candidates, and review history; do not implement recommendations directly
      required_when: architecture_creation_or_major_change_or_repeated_failure_or_user_scan
      reason: Bring external pattern evidence and prior local outcomes into architectural judgment without involving ArchitectureHarvest in ordinary implementation work.

  periodic_architecture_review:
    - name: architectureharvest_architecture_review
      command: create architecture review under architecture/architecture_reviews/ and update architecture/architectureharvest/review_history.md
      cadence: scheduled_project_review_or_before_major_architecture_governance_review
      reason: Check whether new external patterns, stale recommendations, simplification/replacement/deletion opportunities, recurring failures, or adoption outcomes should influence future decisions.

  after_folder_change:
    - name: update_context_summaries
      command: python3 tools/update_context_summaries.py --project {project}
      required: true
      reason: Keep folder summaries usable as context-budget inputs.

  after_task:
    - name: update_context_summaries_if_changed
      command: python3 tools/update_context_summaries.py --project {project}
      required: true
    - name: check_coherence
      command: python3 tools/check_coherence.py --project {project}
      required: true

  before_commit:
    - name: check_coherence
      command: python3 tools/check_coherence.py --project {project}
      required: true

  periodic:
    - name: architecture_reality_audit
      command: python3 tools/architecture_reality_audit.py --project {project} --write-report
      cadence: every_5_to_10_completed_tasks_or_before_major_architecture_or_governance_review
      reason: Detect drift, obsolete docs, duplicated/unused systems, missing implementations, and implementation without documentation.
    - name: review_metrics
      command: python3 tools/review_metrics.py --project {project}
      cadence: every_10_runs_or_on_failure_cluster
      reason: Convert repeated failures into routing, skill, template, or agent-improvement proposals.
    - name: resolve_deferred_specs
      command: python3 tools/resolve_deferred_specs.py --project {project}
      cadence: every_10_runs_or_when_deferred_spec_blocks_work
      reason: Turn repeated deferred-specification blocks into L3 questions.

  event_driven:
    repeated_failure:
      threshold: 3
      actions:
        - review_metrics
        - escalate_capability_if_needed
    deferred_specification_blocks_twice:
      actions:
        - resolve_deferred_specs
        - create_L3_question
        - require_decision_artifact_after_answer
    routing_instability:
      actions:
        - review_metrics
        - propose_model_routing_change

  auto_fix_policy:
    safe_auto_fix_allowed:
      - refresh_context_summaries
      - regenerate_missing_nonpolicy_summary
      - move raw execution notes from metrics to logs when unambiguous
      - move derived metric analysis from logs to metrics when unambiguous
    human_or_codex_required:
      - permission_policy_change
      - model_routing_policy_change
      - architecture_change
      - deletion_or_destructive_action
