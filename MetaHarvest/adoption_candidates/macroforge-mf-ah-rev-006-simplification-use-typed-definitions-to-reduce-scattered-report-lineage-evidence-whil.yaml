candidate:
  id: MF-AH-REV-006
  title: Use typed definitions to reduce scattered report/lineage evidence while preserving
    source-specific loaders
  type: simplification
  status: proposed
  created_from_review: macroforge-first-architectureharvest-review
ranking:
  expected_benefit: 4
  implementation_effort: 2
  maintenance_impact: 3
  architectural_confidence: 4
  benefit_to_effort_ratio: 2.0
  ranking_scale: 1=low, 2=low-medium, 3=medium, 4=high, 5=very high. Benefit-to-effort
    score = expected_benefit / implementation_effort.
  disposition: second_best
recommendation:
  summary: Simplification candidate is strong but depends on the same tiny manifest
    registry; it should be framed as the outcome of MF-AH-REV-001 rather than a separate
    system.
  implementation_boundary: Not implemented. This artifact is recommendation evidence
    only. Any MacroForge change requires a separate user-approved MacroForge task,
    dry-run, tests, coherence, and audit.
  minimum_useful_extraction: Start with the smallest file-backed MacroForge-native
    shape; do not adopt dbt or Dagster runtimes.
  do_not_expand_into:
  - dbt runtime adoption
  - Dagster runtime adoption
  - generalized ingestion framework
  - automatic database writes/materialization
  - large always-loaded lineage/context bundles
