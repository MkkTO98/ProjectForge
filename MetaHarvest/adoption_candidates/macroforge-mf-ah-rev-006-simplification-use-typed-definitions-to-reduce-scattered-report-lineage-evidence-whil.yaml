    - ArchitectureHarvest/adoption_candidates/dagster-replacement-candidate.yaml
    - ArchitectureHarvest/adoption_candidates/dagster-deletion-candidate.yaml
  contradiction_weighting:
  - Prefer file-backed definitions before runtime platform adoption.
  - Keep source-specific loaders until repeated boilerplate proves abstraction value.
  - Use strict contracts for accepted canonical state and lighter reports for spikes.
  - Store full lineage as artifacts and load compact summaries/pointers.
  - Separate static definitions/checks from live writes, schedules, and materialization.
