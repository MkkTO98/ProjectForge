selected_recommendation:
  recommendation_id: PF-AH-REC-010
  title: Test whether the lifecycle/checkpoint vocabulary actually reduces handoff ambiguity in one real long-running ProjectForge task before standardizing it.
  why_stronger_validation_candidate_than_pf_ah_rec_007: >-
    PF-AH-REC-007 validates that ArchitectureHarvest can govern and prune itself. PF-AH-REC-010 validates the harder and more important claim: harvested architectural knowledge can improve ProjectForge's own operational quality. It would test whether LangGraph-derived concepts such as checkpoint identity, interrupt/resume, and observable progress records reduce ambiguity during real ProjectForge work. That produces direct evidence about task lifecycle, context management, and failure recovery rather than only meta-maintenance evidence.
  success_criteria:
  - A real long-running ProjectForge task can be resumed from a compact checkpoint without re-reading broad unrelated context.
  - The checkpoint/lifecycle vocabulary reduces ambiguity in handoff, active goal, and task status compared with prior ad-hoc notes.
  - The vocabulary remains minimal and optional, with no runtime dependency, graph framework, database, dashboard, or scheduler.
  - Tests, coherence, context health, and architecture audit pass after the experiment.
  - A reviewer can decide whether to adopt, modify, or reject the vocabulary from local evidence rather than generic source evidence.
  failure_criteria:
  - The vocabulary adds ceremony without reducing resume/handoff ambiguity.
  - Agents still need broad manual reconstruction or session search to resume the task.
  - The experiment expands into a runtime framework, graph engine, or persistent service.
  - The vocabulary duplicates existing state/task/handoff artifacts without a clear improvement.
  - Verification checks fail or new context-health/coherence warnings appear because of the experiment.
  measurable_outcomes:
  - number_of_resume_decisions_answered_from_checkpoint_without_broader_context
  - number_of_files_needed_to_resume_before_and_after_experiment
  - time_or_steps_to_identify_current_task_phase_after_interruption
  - count_of_ambiguous_or_conflicting_status_fields_before_and_after_experiment
  - context_health_handoff_size_before_and_after_experiment
  - reviewer_rating_of_handoff_clarity_before_and_after_experiment
  - whether_final_adoption_outcome_is_adopt_modified_reject_or_retire
  ecosystem_weighted_model_evidence_estimate:
    amount: high
    rationale: >-
      A successful experiment would create direct ProjectForge outcome evidence for a harvested pattern family, including fit, maintenance cost, measurable operational impact, and boundaries. This is stronger than a meta-governance outcome because it can adjust recommendation strength for lifecycle/checkpoint patterns in future ProjectForge and generated-project reviews.
  new_confidence_if_successful_not_gained_from_pf_ah_rec_007: >-
    We would gain confidence that external harvested architecture patterns can improve ProjectForge's core operating model, especially long-running task recovery, handoff clarity, and context management. PF-AH-REC-007 would only show that ArchitectureHarvest can reduce its own maintenance burden and manage stale recommendations. It would not show that source-derived patterns make ProjectForge work better.
implementation_boundary_for_future_experiment:
  do_not_implement_now: true
  smallest_future_experiment: >-
    In a future approved task, apply a tiny optional lifecycle/checkpoint vocabulary to one real long-running ProjectForge architecture/governance task, record before/after resume evidence, then create an adoption outcome deciding whether to adopt, modify, or reject the vocabulary.
  non_scope:
  - No graph runtime.
  - No dependency on LangGraph or OpenHands.
  - No automatic task scheduler.
  - No broad template rollout before local evidence.
