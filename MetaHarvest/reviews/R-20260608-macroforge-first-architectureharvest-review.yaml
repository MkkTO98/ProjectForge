schema_version: 1
kind: architectureharvest_target_review
review:
  id: macroforge-first-architectureharvest-review
  target_project: macroforge
  analysis_date: '2026-06-08'
  status: recommendation_artifacts_only
  scope: First MacroForge ArchitectureHarvest review using only dbt/Dagster analyses,
    synthesized patterns, contradiction records, MacroForge relevance maps, and adoption
    candidates. External repositories were not inspected.
evidence_scope:
  dbt_comparative: ArchitectureHarvest/reports/R-20260608-dbt-dagster-macroforge-comparative-final-report.md
  dbt_relevance: ArchitectureHarvest/relevance_maps/macroforge/dbt-relevance-map.yaml
  dagster_relevance: ArchitectureHarvest/relevance_maps/macroforge/dagster-relevance-map.yaml
  patterns:
  - ArchitectureHarvest/synthesis/typed_canonical_manifest.yaml
  - ArchitectureHarvest/synthesis/asset_key_lineage_graph.yaml
  - ArchitectureHarvest/synthesis/data_contract_check_gate.yaml
  - ArchitectureHarvest/synthesis/provider_evidence_not_canonical_truth.yaml
  - ArchitectureHarvest/synthesis/definition_execution_boundary.yaml
  - ArchitectureHarvest/synthesis/schema_evolution_policy_surface.yaml
  - ArchitectureHarvest/synthesis/metadata_first_lineage_evidence.yaml
  contradictions:
  - ArchitectureHarvest/contradictions/definition_execution_boundary_vs_runtime_platform.yaml
  - ArchitectureHarvest/contradictions/asset_manifest_vs_source_specific_simplicity.yaml
  - ArchitectureHarvest/contradictions/contracts_vs_flexible_exploration.yaml
  - ArchitectureHarvest/contradictions/lineage_completeness_vs_context_bloat.yaml
  - ArchitectureHarvest/contradictions/auto_orchestration_vs_governance_boundaries.yaml
  candidates:
  - ArchitectureHarvest/adoption_candidates/dbt-adoption-candidate.yaml
  - ArchitectureHarvest/adoption_candidates/dbt-simplification-candidate.yaml
  - ArchitectureHarvest/adoption_candidates/dbt-replacement-candidate.yaml
  - ArchitectureHarvest/adoption_candidates/dbt-deletion-candidate.yaml
  - ArchitectureHarvest/adoption_candidates/dagster-adoption-candidate.yaml
  - ArchitectureHarvest/adoption_candidates/dagster-simplification-candidate.yaml
  - ArchitectureHarvest/adoption_candidates/dagster-replacement-candidate.yaml
  - ArchitectureHarvest/adoption_candidates/dagster-deletion-candidate.yaml
ranking_method:
  scale: 1=low, 2=low-medium, 3=medium, 4=high, 5=very high. Benefit-to-effort score
    = expected_benefit / implementation_effort.
  ranked_by:
  - expected_benefit
  - implementation_effort
  - maintenance_impact
  - architectural_confidence
  implementation_effort_direction: lower is better
  maintenance_impact_direction: lower is better
findings:
- id: MF-AH-REV-001
  category: simplification
  title: Create a tiny file-backed canonical asset/manifest registry for accepted/provisional
    canonicalization artifacts
  scores:
    expected_benefit: 5
    implementation_effort: 2
    maintenance_impact: 2
    architectural_confidence: 5
    benefit_to_effort_ratio: 2.5
  disposition: highest_benefit_to_effort
  summary: 'Unifies dbt typed manifest and Dagster asset-key evidence into the smallest
    MacroForge-native artifact: stable keys plus source/raw/staging/canonical/report
    roles, status, owner, and pointers. It simplifies scattered evidence without introducing
    runtime orchestration.'
- id: MF-AH-REV-002
  category: missing_capability
  title: Add explicit lineage edge artifacts for raw -> staging -> canonical -> report
    paths
  scores:
    expected_benefit: 5
    implementation_effort: 3
    maintenance_impact: 3
    architectural_confidence: 5
    benefit_to_effort_ratio: 1.67
  disposition: valuable_after_manifest
  summary: Lineage evidence is high confidence, but a standalone lineage artifact
    is more useful after a tiny manifest/key vocabulary exists. Keep compact summaries
    and pointers to avoid context bloat.
- id: MF-AH-REV-003
  category: missing_capability
  title: Represent accepted canonicalization checks as reusable contract/check artifacts
  scores:
    expected_benefit: 5
    implementation_effort: 3
    maintenance_impact: 3
    architectural_confidence: 5
    benefit_to_effort_ratio: 1.67
  disposition: valuable_for_accepted_state
  summary: dbt contracts/tests and Dagster asset checks strongly support checks as
    gates, but MacroForge should scope strict checks to accepted canonical state and
    use lighter reports during source spikes.
- id: MF-AH-REV-004
  category: replacement
  title: Replace ad hoc validation/lineage report shapes with explicit manifest/check/lineage
    records once repeated pressure exists
  scores:
    expected_benefit: 4
    implementation_effort: 3
    maintenance_impact: 3
    architectural_confidence: 4
    benefit_to_effort_ratio: 1.33
  disposition: defer_until_repetition
  summary: 'Replacement is likely valuable, but not first: MacroForge should first
    prove the tiny manifest/check format on one existing canonicalization path.'
- id: MF-AH-REV-005
  category: missing_capability
  title: Add schema/mapping/proposal version and deprecation/staleness fields
  scores:
    expected_benefit: 4
    implementation_effort: 3
    maintenance_impact: 3
    architectural_confidence: 5
    benefit_to_effort_ratio: 1.33
  disposition: defer_or_bundle_lightly
  summary: Schema evolution policy is high-confidence, but the first implementation
    can include only minimal version/status fields; full deprecation/staleness model
    needs more local evidence.
- id: MF-AH-REV-006
  category: simplification
  title: Use typed definitions to reduce scattered report/lineage evidence while preserving
    source-specific loaders
  scores:
    expected_benefit: 4
    implementation_effort: 2
    maintenance_impact: 3
    architectural_confidence: 4
    benefit_to_effort_ratio: 2.0
  disposition: second_best
  summary: Simplification candidate is strong but depends on the same tiny manifest
    registry; it should be framed as the outcome of MF-AH-REV-001 rather than a separate
    system.
- id: MF-AH-REV-007
  category: deletion
  title: Retire broad dbt/Dagster runtime adoption as a near-term MacroForge candidate
  scores:
    expected_benefit: 3
    implementation_effort: 1
    maintenance_impact: 1
    architectural_confidence: 5
    benefit_to_effort_ratio: 3.0
  disposition: cheap_guardrail_not_highest_benefit
  summary: Very cheap and high-confidence as a governance guardrail, but expected
    positive capability benefit is lower than manifest creation. Keep runtime adoption
    dormant until refresh/scheduling/materialization pressure appears.
- id: MF-AH-REV-008
  category: deletion
  title: Reject generalized ingestion-framework extraction from dbt/Dagster evidence
  scores:
    expected_benefit: 3
    implementation_effort: 1
    maintenance_impact: 1
    architectural_confidence: 5
    benefit_to_effort_ratio: 3.0
  disposition: cheap_guardrail_not_highest_benefit
  summary: Contradictions strongly favor source-specific loaders for now; deleting/retiring
    generic ingestion ambitions prevents framework creep.
- id: MF-AH-REV-009
  category: more_evidence
  title: Measure repeated validation/report boilerplate across MacroForge sources
    before replacing current reports
  scores:
    expected_benefit: 3
    implementation_effort: 2
    maintenance_impact: 1
    architectural_confidence: 4
    benefit_to_effort_ratio: 1.5
  disposition: needs_local_measurement
  summary: External evidence is strong, but replacement should wait for local evidence
    of repeated shape drift or maintenance overhead.
- id: MF-AH-REV-010
  category: more_evidence
  title: Measure operational refresh/scheduling/materialization pressure before adopting
    orchestration runtime concepts
  scores:
    expected_benefit: 2
    implementation_effort: 2
    maintenance_impact: 1
    architectural_confidence: 5
    benefit_to_effort_ratio: 1.0
  disposition: needs_local_measurement
  summary: dbt/Dagster runtimes solve real orchestration pressure, but MacroForge
    evidence currently supports deferral.
highest_expected_benefit_to_effort:
  id: MF-AH-REV-001
  title: Create a tiny file-backed canonical asset/manifest registry for accepted/provisional
    canonicalization artifacts
  why: 'It captures the shared high-confidence dbt/Dagster patterns with the smallest
    MacroForge-native implementation surface: stable file-backed asset/manifest records.
    It unlocks later lineage, checks, schema evolution, and governance metadata while
    avoiding runtime adoption and preserving source-specific loaders. Although deletion
    guardrails are cheaper, they mainly prevent harm; this candidate creates the largest
    positive capability gain for modest effort.'
do_not_implement_in_this_review: true
validation_expectations:
- YAML parse
- ProjectForge coherence
- Architecture-to-Reality audit JSON mode
- dry-run validation
