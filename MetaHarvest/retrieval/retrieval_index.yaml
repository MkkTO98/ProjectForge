  - relevance_maps/projectforge/swe-agent-relevance-map.yaml
  recommendation_records:
  - adoption_candidates/langgraph-adoption-candidate.yaml
  - adoption_candidates/langgraph-deletion-candidate.yaml
  - adoption_candidates/langgraph-replacement-candidate.yaml
  - adoption_candidates/langgraph-simplification-candidate.yaml
  - adoption_candidates/openhands-adoption-candidate.yaml
  - adoption_candidates/openhands-deletion-candidate.yaml
  - adoption_candidates/openhands-replacement-candidate.yaml
  - adoption_candidates/openhands-simplification-candidate.yaml
  - adoption_candidates/aider-adoption-candidate.yaml
  - adoption_candidates/aider-simplification-candidate.yaml
  - adoption_candidates/aider-replacement-candidate.yaml
  - adoption_candidates/aider-deletion-candidate.yaml
  - adoption_candidates/swe-agent-adoption-candidate.yaml
  - adoption_candidates/swe-agent-simplification-candidate.yaml
  - adoption_candidates/swe-agent-replacement-candidate.yaml
  - adoption_candidates/swe-agent-deletion-candidate.yaml
  recommendation_summary:
    generic_recommendation: Use git/patch/checkpoint/context-boundary patterns from
      Aider, SWE-agent, OpenHands, and LangGraph as advisory evidence; adapt the smallest
      file-backed version first.
    ecosystem_weighted_recommendation: Confidence increased for file-backed checkpoint/recovery
      and patch/diff review boundaries due to multiple independent sources plus one
      narrow ProjectForge checkpoint outcome; confidence decreased for default runtime/dependency/autonomous-publish
      adoption.
    recommendation_strength: strong
    explanation: Four approved sources now provide independent evidence for state,
      context, lifecycle, repository, and recovery patterns.
- problem_id: architecture_decision_reuse
  pattern_ids:
  - problem_first_retrieval
  - synthesized_pattern_cards
  - outcome_weighted_recommendations
  - contradiction_records
  synthesized_patterns:
  - synthesis/problem-first-decision-support.example.yaml
  pattern_cards: []
  component_cards: []
  project_cards:
  - project_cards/aider.yaml
  - project_cards/swe-agent.yaml
  candidate_source_hints:
  - openhands
  - langgraph
  - autogen
  contradiction_records: []
  adoption_outcomes: []
  relevance_maps:
  - relevance_maps/projectforge/
  recommendation_records:
  - adoption_candidates/aider-adoption-candidate.yaml
  - adoption_candidates/aider-simplification-candidate.yaml
  - adoption_candidates/aider-replacement-candidate.yaml
  - adoption_candidates/aider-deletion-candidate.yaml
  - adoption_candidates/swe-agent-adoption-candidate.yaml
  - adoption_candidates/swe-agent-simplification-candidate.yaml
  - adoption_candidates/swe-agent-replacement-candidate.yaml
  - adoption_candidates/swe-agent-deletion-candidate.yaml
  recommendation_summary:
    generic_recommendation: Start ArchitectureHarvest consultations from problem-first
      retrieval and only expand to source reports when compact indexes cannot answer
      the question.
    ecosystem_weighted_recommendation: ProjectForge has already adopted file-based
      governance and context-budget controls, so retrieval should remain concise YAML/Markdown
      rather than adding a database or vector store.
    recommendation_strength: strong
    explanation: Directly reduces context pollution and matches accepted ProjectForge
      constraints.
