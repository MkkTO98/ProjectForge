  - project_cards/langgraph.yaml
  - project_cards/openhands.yaml
  - project_cards/aider.yaml
  - project_cards/swe-agent.yaml
  candidate_source_hints:
  - autogen
  contradiction_records:
  - contradictions/event-log-vs-state-snapshot.yaml
  - contradictions/event-sourcing-vs-snapshot-persistence.example.yaml
  - contradictions/runtime-orchestration-vs-file-backed-governance.yaml
  - contradictions/sandbox-tool-proxy-vs-hermes-tool-approval.yaml
  - contradictions/autocommit-vs-dry-run-approval.yaml
  - contradictions/trajectory-replay-vs-compact-state.yaml
