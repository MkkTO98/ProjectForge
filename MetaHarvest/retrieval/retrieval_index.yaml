schema_version: 1
kind: retrieval_index
updated: '2026-06-06'
purpose: Compact routing index from problem to patterns, components, projects, outcomes,
  contradictions, and recommendation records. Keep concise so Hermes need not load
  every report.
retrieval_flow:
- problem_catalog
- synthesized_pattern_library
- contradiction_records
- adoption_outcomes
- project_specific_relevance_maps
- project_component_reports_only_if_needed
entries:
- problem_id: long_running_agent_state
  pattern_ids:
  - checkpointing
  - event_history
  - file_backed_context_cards
  - interrupt_as_approval_gate
  - observable_task_stream
  - pending_input_queue
  - resumable_execution
  - sandboxed_conversation_runtime
  - thread_checkpoint_contract
  - typed_state_graph
  - git_anchored_coding_workflow
  - bounded_context_selection
  - plan_execute_split
  - trajectory_artifact_recovery
  - patch_submission_boundary
  - reviewer_retry_loop
  - environment_reset_boundary
  synthesized_patterns:
  - synthesis/checkpointing.example.yaml
  - synthesis/interrupt_as_approval_gate.yaml
  - synthesis/observable_task_stream.yaml
  - synthesis/pending_input_queue.yaml
  - synthesis/sandboxed_conversation_runtime.yaml
  - synthesis/thread_checkpoint_contract.yaml
  - synthesis/typed_state_graph.yaml
  - synthesis/git_anchored_coding_workflow.yaml
  - synthesis/bounded_context_selection.yaml
  - synthesis/plan_execute_split.yaml
  - synthesis/trajectory_artifact_recovery.yaml
  - synthesis/patch_submission_boundary.yaml
  - synthesis/reviewer_retry_loop.yaml
  - synthesis/environment_reset_boundary.yaml
  pattern_cards:
  - pattern_library/EXAMPLE-file-backed-context-cards.example.yaml
  component_cards:
  - component_cards/langgraph-checkpoint-saver.yaml
  - component_cards/langgraph-interrupt-command.yaml
  - component_cards/langgraph-pregel-loop.yaml
  - component_cards/langgraph-stategraph.yaml
  - component_cards/langgraph-streaming-task-events.yaml
  - component_cards/openhands-conversation-lifecycle.yaml
  - component_cards/openhands-event-service.yaml
  - component_cards/openhands-mcp-source-control-tools.yaml
  - component_cards/openhands-pending-message-queue.yaml
  - component_cards/openhands-sandbox-boundary.yaml
  - component_cards/aider-git-repo-boundary.yaml
  - component_cards/aider-repo-map-context.yaml
  - component_cards/aider-architect-editor-separation.yaml
  - component_cards/aider-autocommit-undo-lint-test.yaml
  - component_cards/aider-chat-history-summarization.yaml
  - component_cards/swe-agent-run-single-lifecycle.yaml
  - component_cards/swe-agent-trajectory-persistence.yaml
