summary:
  primary_problem_solved: Interactive git-aware coding workflow that keeps editable files explicit, augments context with a ranked repository map, separates architect/editor modes, and anchors modifications in diffs, lint/test feedback, commits, and undoable git history.
  core_architectural_principles:
  - Treat the repository as the workflow boundary and source of truth.
  - Keep editable context explicit while using a compact repo map for broader awareness.
  - Separate planning/discussion modes from code-editing modes.
  - Use git commits, diffs, linting, testing, and undo as the completion/recovery substrate.
  main_assumptions:
  - User is present or intentionally allows autonomous coding flags.
  - Git is available and meaningful for recovery.
  - Interactive context control is preferable to hidden whole-repo loading.
