summary:
  primary_problem_solved: Sandboxed software-agent product/runtime with conversation lifecycle, event persistence, pending-message queues, sandbox management, and MCP/source-control tools. Best reused as patterns, not as a dependency for ProjectForge.
  core_architectural_principles:
  - Make long-running agent work explicit as lifecycle/state records.
  - Separate orchestration/control flow from side-effecting tool/runtime boundaries.
  - Expose observable status and failure states instead of hiding runtime progress in logs.
  main_assumptions:
  - Users accept explicit setup, approvals, and durable state for nontrivial agent work.
  - Reuse for ProjectForge should be pattern-level unless a separate dependency decision is approved.
