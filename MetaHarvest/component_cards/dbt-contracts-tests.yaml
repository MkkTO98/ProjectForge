architecture:
  problem_solved: Models carry enforced contracts, checksums, breaking-change detection,
    data tests, and unit tests that can be scheduled with model dependencies.
  problems_solved:
  - lineage
  - metadata handling
  - validation
  - governance boundary
  related_problems:
  - canonicalization workflows
  - dependency management
  - schema evolution
  anti_problems:
  - premature runtime adoption
  - opaque automatic canonicalization
  failure_modes_addressed:
  - hidden dependency drift
  - untraceable transformation semantics
  - schema/contract changes without review
  failure_modes_introduced:
  - framework complexity if adopted wholesale
  - ceremony if every tiny source slice uses full abstraction
  architectural_principle: Make semantic definitions, lineage, metadata, and validation
    statically inspectable before runtime orchestration.
  required_assumptions:
  - definitions are file-backed
  - validation artifacts are reviewed before adoption
  useful_patterns:
  - Contracts and tests as transformation gates
fit:
  projectforge_relevance:
    score: 5
    rationale: Useful evidence; not a ProjectForge runtime need.
  macroforge_relevance:
    score: 9
    rationale: MacroForge should treat canonical mappings, schemas, and expected rows
      as contract/check artifacts before accepted canonical facts/reports.
  local_fit: moderate
  mismatch_with_local_constraints:
  - MacroForge currently defers generalized frameworks/orchestration.
  - MacroForge must not hide source-specific semantics behind generic loaders.
reuse:
  minimum_useful_extraction: MacroForge should treat canonical mappings, schemas,
    and expected rows as contract/check artifacts before accepted canonical facts/reports.
  use_when:
  - MacroForge has multiple canonical assets or mappings needing static validation.
  - A future decision approves broader metadata/lineage hardening.
  do_not_use_when:
  - A source-specific bounded loader or fixture task is enough.
  - Adoption would create a framework before evidence requires it.
