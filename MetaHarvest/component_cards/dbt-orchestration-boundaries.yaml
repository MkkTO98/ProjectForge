architecture:
  problem_solved: dbt separates load, resolve, schedule, analyze, run/show phases
    and can build phased task graphs with barriers.
  problems_solved:
  - lineage
  - metadata handling
  - validation
  - governance boundary
  related_problems:
  - canonicalization workflows
  - dependency management
  - schema evolution
  anti_problems:
  - premature runtime adoption
  - opaque automatic canonicalization
  failure_modes_addressed:
  - hidden dependency drift
  - untraceable transformation semantics
  - schema/contract changes without review
  failure_modes_introduced:
  - framework complexity if adopted wholesale
  - ceremony if every tiny source slice uses full abstraction
  architectural_principle: Make semantic definitions, lineage, metadata, and validation
    statically inspectable before runtime orchestration.
  required_assumptions:
  - definitions are file-backed
  - validation artifacts are reviewed before adoption
  useful_patterns:
  - Load/resolve/schedule/run phase boundaries
fit:
  projectforge_relevance:
    score: 5
    rationale: Useful evidence; not a ProjectForge runtime need.
  macroforge_relevance:
    score: 9
    rationale: 'MacroForge can adopt phase vocabulary without adopting orchestration:
      canonicalization proposal generation stays separate from ingestion/execution.'
  local_fit: moderate
  mismatch_with_local_constraints:
  - MacroForge currently defers generalized frameworks/orchestration.
  - MacroForge must not hide source-specific semantics behind generic loaders.
reuse:
