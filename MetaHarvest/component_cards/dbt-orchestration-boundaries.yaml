    orchestration: canonicalization proposal generation stays separate from ingestion/execution.'
  use_when:
  - MacroForge has multiple canonical assets or mappings needing static validation.
  - A future decision approves broader metadata/lineage hardening.
  do_not_use_when:
  - A source-specific bounded loader or fixture task is enough.
  - Adoption would create a framework before evidence requires it.
