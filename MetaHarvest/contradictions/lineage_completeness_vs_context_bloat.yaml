schema_version: 1
kind: contradiction_record
contradiction:
  id: lineage_completeness_vs_context_bloat
  name: Complete lineage metadata vs context bloat
  status: active
  problem_ids:
  - macroforge_canonicalization
  - data_governance
  - orchestration_boundary
competing_approaches:
- approach_id: external_framework_default
  summary: Adopt dbt/Dagster style runtime/framework concepts broadly.
  assumptions:
  - pipeline volume justifies platform complexity
  - team needs standardized transformation/orchestration runtime
  wins_when:
  - many repeated transformations/assets
  - scheduling/materialization and observability are bottlenecks
  loses_when:
  - small source-specific fixtures and raw-SQL governance are sufficient
  failure_modes_addressed:
  - manual dependency drift
  - missing runtime observability
  failure_modes_introduced:
  - framework lock-in
  - semantic hiding
  - maintenance overhead
- approach_id: macroforge_bounded_file_first
  summary: Extract file-backed definitions/checks/metadata patterns while keeping
    source-specific raw SQL/PostgreSQL and governance gates.
  assumptions:
  - semantic uncertainty matters more than runtime efficiency now
  - human-reviewed decisions gate architecture changes
  wins_when:
  - current task is canonicalization design or fixture validation
  - source semantics differ materially
  loses_when:
  - operational refresh/scheduling becomes bottleneck
  failure_modes_addressed:
  - premature overengineering
  - opaque canonical facts
  failure_modes_introduced:
  - more manual orchestration until pressure justifies tools
recommendation:
  action: prefer_approach
  guidance: store full lineage as artifacts, load compact summaries/pointers in normal
    context
  confidence: high
  evidence_quality: high
  analysis_limitations:
  - Static source evidence; no framework adoption experiment.
links:
