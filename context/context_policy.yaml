context_policy:
  default_budget_tokens: 24000
  max_budget_tokens: 64000
  mode: smallest_sufficient
  include_order:
    - CONSTITUTION.md
    - instructions/GENERAL_INSTRUCTIONS.md
    - state/active_goal.md
    - state/project_state.md
    - state/architecture.md
    - artifacts/decisions/relevant
    - folder_summaries/relevant
    - source_files/relevant
    - logs/recent_if_needed
    - metrics/relevant_if_needed
  folder_summaries:
    enabled: true
    filename: _SUMMARY.md
    maintained_by: context_manager
  compression:
    summarize_large_files: true
    large_file_line_threshold: 250
    prefer_summaries_for_non_target_folders: true
