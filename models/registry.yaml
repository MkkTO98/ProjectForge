models:
  hermes_default:
    provider: hermes
    interface: active_hermes_session
    installed: true
    roles: [planner, reviewer, bootstrapper, orchestrator]
    strengths: [general_reasoning, instruction_following, orchestration, adaptive_questioning]
    size_class: session_default
    context_window: managed_by_hermes

  deepseek_r1_14b:
    provider: ollama
    model_name: "deepseek-r1:14b"
    interface: ollama
    installed: available_or_verify
    roles: [planner, reviewer, debugger]
    strengths: [reasoning, planning, debugging, review]
    weaknesses: [slower_on_cpu, heavy_resource_usage]
    size_class: large
    context_window: model_specific

  deepseek_coder_v2:
    provider: ollama
    model_name: "deepseek-coder-v2:latest"
    interface: ollama
    installed: available_or_verify
    roles: [coder, debugger]
    strengths: [coding, refactoring, api_work, debugging]
    weaknesses: [weaker_high_level_planning]
    size_class: large
    context_window: model_specific

  qwen3_14b:
    provider: ollama
    model_name: "qwen3:14b"
    interface: ollama
    installed: available_or_verify
    roles: [planner, reviewer, summarizer]
    strengths: [reasoning, planning, general_tasks, summarization]
    weaknesses: [slower_on_cpu]
    size_class: large
    context_window: model_specific

  qwen3_4b:
    provider: ollama
    model_name: "qwen3:4b"
    interface: ollama
    installed: available_or_verify
    roles: [summarizer, context_manager]
    strengths: [summaries, lightweight_reasoning, context_cleanup, background_tasks]
    weaknesses: [weaker_complex_coding]
    size_class: small
    context_window: model_specific

  llama32_3b:
    provider: ollama
    model_name: "llama3.2:3b"
    interface: ollama
    installed: optional
    roles: [summarizer, formatter]
    strengths: [tiny_tasks, formatting, quick_summaries]
    weaknesses: [weak_reasoning, weak_coding]
    size_class: tiny
    context_window: model_specific

  qwen_coder:
    provider: local
    interface: ollama_or_local_runtime
    installed: unknown
    roles: [coder, debugger]
    strengths: [code_generation, code_editing]
    size_class: unknown
    context_window: unknown

  small_summarizer:
    provider: local
    interface: ollama_or_local_runtime
    installed: unknown
    roles: [summarizer, folder_summary_updater]
    strengths: [cheap_summarization, routine_compression]
    size_class: small
    context_window: unknown

  codex_supervisor:
    provider: openai
    interface: hermes_provider_or_codex_cli
    installed: external
    roles: [supervisor, architecture_review, hard_debugging]
    strengths: [high_quality_reasoning, complex_code_review]
    size_class: remote
    context_window: external
