workspace:
  name: default_projectforge_workspace
  description: Shared registry for projects that may reuse ProjectForge conventions.
  registry_role: descriptive_only_not_authoritative
  governance_authority: none
  future_ownership: TBD through future ecosystem governance review
projects:
- name: MacroForge
  path: /home/mkkto/srv/EIP/projects/MacroForge
  mode: hybrid_inheritance
- name: InsightForge
  path: /home/mkkto/srv/EIP/projects/InsightForge
  mode: hybrid_inheritance
shared_defaults:
  models: ../models/registry.yaml
  model_routing: ../models/routing.yaml
  skills: ../skills/
  instructions: ../instructions/
  logging_policy: ../logs/logging_policy.yaml
  permission_policy: ../permissions/
rules:
- Cross-project dependencies must be declared in cross_project_dependencies.yaml.
- Shared assets must not silently override project-local policies.
- Project-local decisions override workspace defaults only when recorded in artifacts/decisions/.
- Secrets must never be stored in the workspace registry.
- The registry is descriptive; it does not govern projects or grant write authority.
- Registered projects retain autonomy and project-local governance.
- Future registry ownership is not assigned to EII, MetaHarvest, ProjectForge, or
  another project by default; EIP means the ecosystem, not a project owner.
